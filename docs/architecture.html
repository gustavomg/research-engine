<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Engine — Arquitectura</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 40px 20px; }
    h1 { color: #58a6ff; font-size: 1.6em; font-weight: 500; margin-bottom: 8px; }
    .subtitle { color: #8b949e; font-size: 0.9em; margin-bottom: 40px; }
    .diagram-container { max-width: 860px; margin: 0 auto; }
    svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.85; }
    .tooltip { position: fixed; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #c9d1d9; max-width: 280px; line-height: 1.6; pointer-events: none; display: none; z-index: 100; }
    .tooltip h3 { color: #58a6ff; font-size: 13px; margin-bottom: 6px; }
    .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 32px; max-width: 860px; margin: 32px auto 0; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .footer { text-align: center; margin-top: 48px; color: #8b949e; font-size: 12px; }
    .footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
<div class="diagram-container">
  <h1>Research Engine Distribuido</h1>
  <p class="subtitle">Arquitectura del sistema multiagente — haz clic en cada componente para más información</p>
  <svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <g class="node" onclick="showInfo('usuario')"><rect x="260" y="20" width="160" height="44" rx="8" fill="#21262d" stroke="#30363d" stroke-width="0.5"/><text x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#c9d1d9" font-size="14" font-weight="500">Usuario</text></g>
    <line x1="340" y1="64" x2="340" y2="108" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="355" y="90" fill="#8b949e" font-size="11">tema</text>
    <g class="node" onclick="showInfo('orchestrator')"><rect x="190" y="108" width="300" height="56" rx="8" fill="#1a1139" stroke="#534AB7" stroke-width="0.5"/><text x="340" y="129" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="14" font-weight="500">Orchestrator</text><text x="340" y="150" text-anchor="middle" dominant-baseline="central" fill="#7F77DD" font-size="12">orchestrator.py — descompone el tema</text></g>
    <line x1="340" y1="164" x2="340" y2="218" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="356" y="196" fill="#8b949e" font-size="11">crea tareas</text>
    <g class="node" onclick="showInfo('beads')"><rect x="190" y="218" width="300" height="56" rx="8" fill="#1f1a0d" stroke="#BA7517" stroke-width="0.5"/><text x="340" y="239" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="14" font-weight="500">Beads + Dolt</text><text x="340" y="260" text-anchor="middle" dominant-baseline="central" fill="#BA7517" font-size="12">pizarra compartida — trazabilidad Git</text></g>
    <path d="M230 274 L230 310 L150 310 L150 348" fill="none" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M450 274 L450 310 L530 310 L530 348" fill="none" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="60" y="308" fill="#8b949e" font-size="11">SUBTEMA-1</text>
    <text x="458" y="308" fill="#8b949e" font-size="11">SUBTEMA-2</text>
    <g class="node" onclick="showInfo('researcher1')"><rect x="50" y="348" width="200" height="56" rx="8" fill="#0d1f1a" stroke="#0F6E56" stroke-width="0.5"/><text x="150" y="369" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="14" font-weight="500">Researcher-1</text><text x="150" y="390" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="12">polling Beads — busca en arXiv</text></g>
    <g class="node" onclick="showInfo('researcher2')"><rect x="430" y="348" width="200" height="56" rx="8" fill="#0d1f1a" stroke="#0F6E56" stroke-width="0.5"/><text x="530" y="369" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="14" font-weight="500">Researcher-2</text><text x="530" y="390" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="12">delay 30s — busca en Wikipedia</text></g>
    <g class="node" onclick="showInfo('ollama')"><rect x="200" y="348" width="230" height="56" rx="8" fill="#1f0f0a" stroke="#993C1D" stroke-width="0.5"/><text x="315" y="369" text-anchor="middle" dominant-baseline="central" fill="#F0997B" font-size="14" font-weight="500">Ollama + qwen2.5:7b</text><text x="315" y="390" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-size="12">LLM local — puerto 11434</text></g>
    <line x1="250" y1="404" x2="250" y2="448" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="530" y1="404" x2="530" y2="448" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <g class="node" onclick="showInfo('playwright')"><rect x="50" y="448" width="200" height="44" rx="8" fill="#0a1520" stroke="#185FA5" stroke-width="0.5"/><text x="150" y="470" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="13" font-weight="500">Playwright + arXiv</text></g>
    <g class="node" onclick="showInfo('playwright')"><rect x="430" y="448" width="200" height="44" rx="8" fill="#0a1520" stroke="#185FA5" stroke-width="0.5"/><text x="530" y="470" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="13" font-weight="500">Playwright + Wikipedia</text></g>
    <line x1="150" y1="492" x2="150" y2="516" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="530" y1="492" x2="530" y2="516" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <g class="node" onclick="showInfo('findings')"><rect x="50" y="516" width="200" height="44" rx="8" fill="#0d1a0d" stroke="#3B6D11" stroke-width="0.5"/><text x="150" y="538" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="13" font-weight="500">finding-1.md</text></g>
    <g class="node" onclick="showInfo('findings')"><rect x="430" y="516" width="200" height="44" rx="8" fill="#0d1a0d" stroke="#3B6D11" stroke-width="0.5"/><text x="530" y="538" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="13" font-weight="500">finding-2.md</text></g>
    <path d="M210 538 L280 538 L280 572 L230 572" fill="none" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M430 538 L390 538 L390 572 L450 572" fill="none" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <g class="node" onclick="showInfo('synthesizer')"><rect x="190" y="560" width="140" height="44" rx="8" fill="#1a1139" stroke="#534AB7" stroke-width="0.5"/><text x="260" y="582" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="13" font-weight="500">Synthesizer</text></g>
    <g class="node" onclick="showInfo('critic')"><rect x="350" y="560" width="140" height="44" rx="8" fill="#1f0a0a" stroke="#A32D2D" stroke-width="0.5"/><text x="420" y="582" text-anchor="middle" dominant-baseline="central" fill="#F09595" font-size="13" font-weight="500">Critic</text></g>
    <line x1="330" y1="582" x2="350" y2="582" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <g class="node" onclick="showInfo('monitor')"><rect x="500" y="218" width="160" height="56" rx="8" fill="#0a1520" stroke="#185FA5" stroke-width="0.5"/><text x="580" y="239" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="14" font-weight="500">Monitor web</text><text x="580" y="260" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-size="12">Flask — puerto 5001</text></g>
    <line x1="500" y1="246" x2="492" y2="246" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="20" y="330" width="640" height="300" rx="12" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="6 4"/>
    <text x="36" y="324" fill="#8b949e" font-size="11">tmux — 4 paneles en paralelo</text>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>Coordinación</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Investigación</div>
    <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div>LLM local</div>
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Web / Monitor</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Outputs</div>
    <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>Control de calidad</div>
  </div>
  <div class="footer"><p>Research Engine Distribuido · <a href="https://github.com/gustavomg/research-engine">github.com/gustavomg/research-engine</a></p></div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const info = {
  usuario: { title: "Usuario", desc: "Introduce el tema de investigación en el panel del Orchestrator. Es el único punto de entrada manual del sistema." },
  orchestrator: { title: "Orchestrator", desc: "Recibe el tema, lo descompone en 2 subtemas usando qwen2.5:7b y crea las tareas en Beads. No investiga — solo coordina." },
  beads: { title: "Beads + Dolt", desc: "Base de datos versionada. Actúa como pizarra compartida entre agentes. Cada operación genera un commit en Dolt con trazabilidad completa." },
  researcher1: { title: "Researcher-1", desc: "Hace polling a Beads cada 5s. Cuando detecta su tarea, busca en arXiv con Playwright y sintetiza con qwen2.5:7b." },
  researcher2: { title: "Researcher-2", desc: "Igual que Researcher-1 pero con delay de 30s para evitar colisión en Ollama. Investiga el segundo subtema." },
  ollama: { title: "Ollama + qwen2.5:7b", desc: "LLM local de 7B parámetros con function calling nativo. Sin coste, sin internet requerido. Puerto 11434." },
  playwright: { title: "Playwright", desc: "Automatiza Chromium headless para buscar en arXiv (papers) y Wikipedia. Devuelve contenido real y actualizado." },
  findings: { title: "Findings", desc: "Archivos Markdown con hallazgos, fuentes web y análisis. Guardados en ~/research-engine/findings/" },
  synthesizer: { title: "Synthesizer", desc: "Espera 2 findings. Consolida en informe final: resumen ejecutivo, patrones, contradicciones y conclusiones. Registra en Beads." },
  critic: { title: "Critic", desc: "Evalúa sesgos, afirmaciones sin soporte y lagunas del informe. Genera preguntas de seguimiento. Cierra el ciclo de calidad en Beads." },
  monitor: { title: "Monitor web", desc: "Dashboard Flask en http://localhost:5001. Estado de agentes, tareas Beads y findings en tiempo real. Refresco cada 3s." }
};
const tooltip = document.getElementById('tooltip');
function showInfo(id) {
  const d = info[id];
  if (!d) return;
  tooltip.innerHTML = `<h3>${d.title}</h3>${d.desc}`;
  tooltip.style.display = 'block';
}
document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'block') {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.node')) tooltip.style.display = 'none';
});
</script>
</body>
</html>
