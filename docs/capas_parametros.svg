<text x="416" y="500" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e">POLL_INTERVAL=5s</text>
<text x="416" y="516" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e">DELAY_START=30s</text>
<text x="416" y="532" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e">MAX_ITERATIONS=2</text>
